name: Android CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out
      uses: actions/checkout@v4
      with:
        submodules: "recursive"
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Build Debug APK
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      run: ./gradlew assembleDebug

    - name: Generate keystore file for release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore.jks
        echo "storeFile=keystore.jks" >> local.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

    - name: Build Release APK
      if: startsWith(github.ref, 'refs/tags/')
      run: ./gradlew assembleRelease
      
    - name: Sign APK
      if: startsWith(github.ref, 'refs/tags/')
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEYSTORE_FILE }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"
        
    - name: Create Xposed Module Zip
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        mkdir -p module/
        cp app/build/outputs/apk/release/app-release-signed.apk module/PrivacySpace.apk
        VERSION=$(echo ${{ github.ref }} | sed 's/refs\/tags\/v//')
        cat > module/module.prop << EOL
        id=cn.geektang.privacyspace
        name=Privacy Space
        version=v${VERSION}
        versionCode=${VERSION//./}
        author=GeekTang
        description=Hide your applications from other apps. Works like MIUI Second Space.
        EOL
        cd module
        zip -r ../PrivacySpace-${VERSION}.zip *
        cd ..

    - name: Upload Debug APK
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      uses: actions/upload-artifact@v4
      with:
        name: PrivacySpace-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: PrivacySpace-Release-APK
        path: app/build/outputs/apk/release/app-release-signed.apk
        
    - name: Upload Xposed Module
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: PrivacySpace-Xposed-Module
        path: module/
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/release/app-release-signed.apk
          PrivacySpace-*.zip
        name: Privacy Space ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
